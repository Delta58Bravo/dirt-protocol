<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dirt Protocol</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dirt Protocol">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --surface2: #1E1E1E;
      --surface3: #282828;
      --border: #2A2A2A;
      --orange: #F97316;
      --orange-dim: #C2570F;
      --orange-glow: rgba(249,115,22,0.15);
      --text: #F5F5F5;
      --text-muted: #888;
      --text-dim: #555;
      --green: #22C55E;
      --red: #EF4444;
      --blue: #3B82F6;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overscroll-behavior: none;
      overflow-x: hidden;
      width: 100%;
    }

    #app { min-height: 100vh; }

    /* ── LOGIN ── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(ellipse at 50% 0%, rgba(249,115,22,0.08) 0%, var(--bg) 70%);
    }
    .login-card {
      width: 100%;
      max-width: 360px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .login-logo .wordmark {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--text);
    }
    .login-logo .wordmark span { color: var(--orange); }
    .login-logo .tagline {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .login-card input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-size: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      outline: none;
      margin-bottom: 12px;
    }
    .login-card input:focus { border-color: var(--orange); }
    .login-card button {
      width: 100%;
      background: var(--orange);
      color: #000;
      font-size: 15px;
      font-weight: 700;
      padding: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .login-card button:active { background: var(--orange-dim); }
    .login-err { color: var(--red); font-size: 13px; margin-bottom: 10px; }

    /* ── NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 0 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      gap: 4px;
      transition: color 0.15s;
    }
    .nav-btn.active { color: var(--orange); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* ── MAIN LAYOUT ── */
    .main-content {
      padding-bottom: calc(64px + env(safe-area-inset-bottom));
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .page-header {
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    .page-title span { color: var(--orange); }

    /* ── SECTION ── */
    .section { padding: 20px 20px 0; }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-orange {
      background: var(--orange-glow);
      border-color: rgba(249,115,22,0.3);
    }

    /* ── HOME ── */
    .hero-card {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .hero-card::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-greeting {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .hero-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }
    .hero-stats {
      display: flex;
      gap: 16px;
    }
    .hero-stat {
      display: flex;
      flex-direction: column;
    }
    .hero-stat-val {
      font-size: 22px;
      font-weight: 900;
      color: var(--orange);
    }
    .hero-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .next-up-card {
      background: var(--orange-glow);
      border: 1px solid rgba(249,115,22,0.25);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      active: opacity 0.8;
    }
    .next-up-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 6px;
    }
    .next-up-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .next-up-sub {
      font-size: 13px;
      color: var(--text-muted);
    }
    .btn-start {
      width: 100%;
      background: var(--orange);
      color: #000;
      font-size: 15px;
      font-weight: 800;
      padding: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-top: 12px;
    }
    .btn-start:active { opacity: 0.85; }

    .recent-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .recent-item:last-child { border-bottom: none; }
    .recent-name { font-size: 14px; font-weight: 600; }
    .recent-date { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .recent-badge {
      font-size: 11px;
      font-weight: 700;
      background: var(--orange-glow);
      color: var(--orange);
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid rgba(249,115,22,0.2);
    }

    /* ── PROGRAMS ── */
    .program-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .program-card:active { border-color: var(--orange); }
    .program-icon { font-size: 28px; margin-bottom: 10px; }
    .program-name { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
    .program-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.4; }
    .program-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 5px;
      background: var(--surface3);
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .tag-orange { background: var(--orange-glow); color: var(--orange); }

    /* ── DAY LIST (program detail) ── */
    .back-btn {
      background: none;
      border: none;
      color: var(--orange);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 20px 20px 0;
    }
    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s;
    }
    .day-card:active { border-color: var(--orange); }
    .day-card.completed { border-color: rgba(34,197,94,0.3); }
    .day-number {
      width: 40px; height: 40px;
      background: var(--surface3);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      color: var(--orange);
      flex-shrink: 0;
    }
    .day-number.done { background: rgba(34,197,94,0.15); color: var(--green); }
    .day-info { flex: 1; }
    .day-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .day-focus { font-size: 12px; color: var(--text-muted); }
    .day-arrow { color: var(--text-dim); font-size: 18px; }

    /* ── ACTIVE WORKOUT ── */
    .workout-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .workout-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
    .workout-title { font-size: 18px; font-weight: 900; }
    .workout-progress-bar {
      height: 3px;
      background: var(--surface3);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }
    .workout-progress-fill {
      height: 100%;
      background: var(--orange);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .exercise-card {
      margin: 16px 16px 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .exercise-card.current { border-color: var(--orange); }
    .exercise-card.done-ex { border-color: rgba(34,197,94,0.4); opacity: 0.7; }

    .exercise-header {
      padding: 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .exercise-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2px;
    }
    .exercise-name { font-size: 17px; font-weight: 800; }
    .exercise-note { font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
    .video-link {
      color: var(--orange);
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .prev-weight {
      margin: 0 16px;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .prev-weight strong { color: var(--text); }

    .sets-area { padding: 12px 16px 16px; }

    /* Column headers */
    .set-col-headers {
      display: grid;
      grid-template-columns: 28px 1fr 1fr 48px;
      gap: 8px;
      margin-bottom: 6px;
      padding: 0 2px;
    }
    .set-col-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.2;
    }

    .set-row {
      display: grid;
      grid-template-columns: 28px 1fr 1fr 48px;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    .set-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      text-align: center;
    }
    .set-select {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-size: 17px;
      font-weight: 700;
      padding: 12px 4px;
      border-radius: 10px;
      text-align: center;
      text-align-last: center;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      outline: none;
    }
    .set-select:focus { border-color: var(--orange); }
    .set-select.done-set {
      background: rgba(34,197,94,0.08);
      border-color: rgba(34,197,94,0.3);
      color: var(--green);
    }
    .set-select:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .set-check {
      width: 48px; height: 48px;
      background: var(--surface3);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
    }
    .set-check.checked {
      background: rgba(34,197,94,0.15);
      color: var(--green);
    }

    .btn-next-exercise {
      margin: 12px 16px 16px;
      width: calc(100% - 32px);
      background: var(--orange);
      color: #000;
      font-size: 14px;
      font-weight: 800;
      padding: 13px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .btn-next-exercise:active { opacity: 0.85; }
    .btn-finish {
      margin: 12px 16px 16px;
      width: calc(100% - 32px);
      background: var(--green);
      color: #000;
      font-size: 14px;
      font-weight: 800;
      padding: 13px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    /* REST TIMER */
    .rest-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .rest-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .rest-timer {
      font-size: 80px;
      font-weight: 900;
      color: var(--orange);
      letter-spacing: -3px;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }
    .rest-next {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .rest-skip {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      padding: 12px 32px;
      border-radius: 10px;
      cursor: pointer;
    }

    /* WORKOUT COMPLETE */
    .complete-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      background: radial-gradient(ellipse at 50% 30%, rgba(249,115,22,0.1) 0%, var(--bg) 70%);
    }
    .complete-icon { font-size: 64px; margin-bottom: 24px; }
    .complete-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
    .complete-sub { font-size: 15px; color: var(--text-muted); margin-bottom: 32px; }
    .complete-stats {
      display: flex;
      gap: 24px;
      margin-bottom: 40px;
    }
    .complete-stat-val { font-size: 28px; font-weight: 900; color: var(--orange); }
    .complete-stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .btn-done {
      background: var(--orange);
      color: #000;
      font-size: 16px;
      font-weight: 800;
      padding: 16px 48px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    /* HISTORY */
    .history-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .history-session {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
    }
    .history-session-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .history-session-name { font-size: 15px; font-weight: 800; }
    .history-session-date { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .history-session-dur {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface3);
      padding: 4px 8px;
      border-radius: 6px;
    }
    .history-ex { margin-bottom: 8px; }
    .history-ex-name { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; }
    .history-sets { display: flex; flex-wrap: wrap; gap: 6px; }
    .history-set-tag {
      font-size: 12px;
      font-weight: 600;
      background: var(--surface3);
      padding: 3px 8px;
      border-radius: 5px;
      color: var(--text);
    }

    /* PROFILE */
    .profile-stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .profile-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    .profile-stat-val { font-size: 26px; font-weight: 900; color: var(--orange); }
    .profile-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    .pr-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .pr-item:last-child { border-bottom: none; }
    .pr-name { font-size: 13px; font-weight: 600; }
    .pr-val { font-size: 13px; font-weight: 800; color: var(--orange); }

    /* UTILS */
    .mt-4 { margin-top: 16px; }
    .text-muted { color: var(--text-muted); }
    .text-orange { color: var(--orange); }

    /* Scrollable without bounce weirdness on iOS */
    .scroll-view { -webkit-overflow-scrolling: touch; }
  </style>
</head>

  view: 'login',       // login | home | programs | program-detail | workout | complete | history | profile
  authed: false,
  program: null,       // selected program object
  dayIndex: null,      // selected day index
  exIndex: 0,          // current exercise in active workout
  setData: {},         // { exIndex: [ {weight, reps, done}, ... ] }
  restActive: false,
  restSeconds: 0,
  restTimer: null,
  workoutStart: null,
  workoutSessions: [], // loaded from Firebase
  prevWeights: {},     // { exerciseName: { weight, reps } } — last session's data
};

// ════════════════════════════════════════════════
//  FIREBASE HELPERS
// ════════════════════════════════════════════════
function dbRef(path) {
  if (!db) return null;
  return db.ref('ryan/' + path);
}

function saveSession(session) {
  const ref = dbRef('sessions');
  if (!ref) return;
  ref.push(session);
}

function loadSessions(callback) {
  const ref = dbRef('sessions');
  if (!ref) { callback([]); return; }
  ref.orderByChild('startedAt').limitToLast(50).once('value', snap => {
    const sessions = [];
    snap.forEach(child => sessions.unshift({ id: child.key, ...child.val() }));
    callback(sessions);
  });
}

function buildPrevWeights(sessions) {
  const prev = {};
  // sessions is newest-first after the unshift
  for (const s of sessions) {
    if (!s.exercises) continue;
    for (const [name, ex] of Object.entries(s.exercises)) {
      if (!prev[name] && ex.sets && ex.sets.length) {
        const doneSets = ex.sets.filter(s => s.done && s.weight);
        if (doneSets.length) {
          const best = doneSets.reduce((a,b) => (b.weight > a.weight ? b : a));
          prev[name] = { weight: best.weight, reps: best.reps };
        }
      }
    }
  }
  return prev;
}

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
// ── PICKERS ──────────────────────────────────────
function extractDefaultReps(repsStr) {
  const match = repsStr.match(/\d+/);
  return match ? match[0] : '10';
}

function buildWeightOptions(selected) {
  let html = '<option value="">—</option>';
  // 0 to 100 in 2.5 lb steps
  for (let w = 0; w <= 100; w += 2.5) {
    const v = (w % 1 === 0) ? String(w) : w.toFixed(1);
    html += `<option value="${v}"${String(selected) === v ? ' selected' : ''}>${v}</option>`;
  }
  // 105 to 300 in 5 lb steps
  for (let w = 105; w <= 300; w += 5) {
    html += `<option value="${w}"${String(selected) === String(w) ? ' selected' : ''}>${w}</option>`;
  }
  return html;
}

function buildRepsOptions(selected) {
  let html = '<option value="">—</option>';
  for (let r = 1; r <= 50; r++) {
    html += `<option value="${r}"${String(selected) === String(r) ? ' selected' : ''}>${r}</option>`;
  }
  return html;
}

function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatDuration(ms) {
  const m = Math.round(ms / 60000);
  return m + ' min';
}

function daysSince(ts) {
  return Math.floor((Date.now() - ts) / 86400000);
}

function getStreak(sessions) {
  if (!sessions.length) return 0;
  let streak = 0;
  let lastDay = Math.floor(Date.now() / 86400000);
  for (const s of sessions) {
    const sDay = Math.floor(s.startedAt / 86400000);
    if (lastDay - sDay <= 1) { streak++; lastDay = sDay; }
    else break;
  }
  return streak;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return "Good morning";
  if (h < 17) return "Good afternoon";
  return "Good evening";
}

function buildSetData(day) {
  const data = {};
  day.exercises.forEach((ex, i) => {
    const prevW = state.prevWeights[ex.name]?.weight || '';
    const prevR = state.prevWeights[ex.name]?.reps || extractDefaultReps(ex.reps);
    data[i] = Array.from({ length: ex.sets }, () => ({
      weight: String(prevW),
      reps: String(prevR),
      done: false
    }));
  });
  return data;
}

//  RENDER
// ════════════════════════════════════════════════
function render() {
  const root = document.getElementById('app');
  root.innerHTML = '';

  if (!state.authed) { root.appendChild(renderLogin()); return; }
  if (state.restActive) { root.appendChild(renderRest()); }

  const wrap = document.createElement('div');

  switch (state.view) {
    case 'home':           wrap.appendChild(renderHome()); break;
    case 'programs':       wrap.appendChild(renderPrograms()); break;
    case 'program-detail': wrap.appendChild(renderProgramDetail()); break;
    case 'workout':        wrap.appendChild(renderWorkout()); break;
    case 'complete':       wrap.appendChild(renderComplete()); break;
    case 'history':        wrap.appendChild(renderHistory()); break;
    case 'profile':        wrap.appendChild(renderProfile()); break;
  }

  if (!['workout', 'complete'].includes(state.view)) {
    wrap.appendChild(renderNav());
  }
  root.appendChild(wrap);
}

      </form>
    </div>
  `;
  div.querySelector('#login-form').addEventListener('submit', e => {
    e.preventDefault();
    const pwd = div.querySelector('#pwd-input').value.trim();
    if (pwd === 'bravo') {
      state.authed = true;
      localStorage.setItem('dp-auth', '1');
      loadSessions(sessions => {

      div.querySelector('#pwd-input').value = '';

  return div;
}

            <div class="hero-stat-val">${total}</div>
            <div class="hero-stat-label">Total Sessions</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-val">${lastSession ? formatDuration(lastSession.duration || 0) : '—'}</div>
            <div class="hero-stat-label">Last Session</div>
          </div>
        </div>
      </div>

      <div class="section-label" style="margin-top:8px;">Next Up</div>
      <div class="next-up-card" id="next-up-card">
        <div class="next-up-label">▸ ${nextProgram.name}</div>
        <div class="next-up-title">Day ${nextDayIndex + 1}: ${nextDay.name}</div>
        <div class="next-up-sub">${nextDay.focus}</div>
        <div class="next-up-sub" style="margin-top:4px;">${nextDay.exercises.length} exercises</div>
        <button class="btn-start" id="start-next-btn">START WORKOUT</button>
      </div>

      ${lastSession ? `
      <div class="section-label" style="margin-top:8px;">Last Session</div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div style="font-size:15px;font-weight:800;">${lastSession.dayName}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${formatDate(lastSession.startedAt)} · ${formatDuration(lastSession.duration || 0)}</div>
          </div>
          <div style="color:var(--green);font-size:18px;">✓</div>
        </div>
      </div>` : ''}
    </div>
  `;

  div.querySelector('#start-next-btn').addEventListener('click', () => {
    startWorkout(nextProgram, nextDayIndex);
  });

  return div;
}

function doLogout() {
  state.authed = false;
  localStorage.removeItem('dp-auth');
  state.view = 'login';
  render();
}

// ── PROGRAMS ───────────────────────────────────
function renderPrograms() {
  const div = document.createElement('div');
  div.className = 'main-content scroll-view';
  div.innerHTML = `<div class="page-header" style="padding-bottom:20px;"><div class="page-title">Programs</div></div><div class="section" style="padding-top:0;">`;

  PROGRAMS.forEach(prog => {
    const card = document.createElement('div');
    card.className = 'program-card';
    card.innerHTML = `
      <div class="program-icon">${prog.icon}</div>
      <div class="program-name">${prog.name}</div>
      <div class="program-desc">${prog.desc}</div>
      <div class="program-meta">
        ${prog.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
    `;
    card.addEventListener('click', () => {
      state.program = prog;
      state.view = 'program-detail';
      render();
    });
    div.querySelector('.section').appendChild(card);
  });

  return div;
}

// ── PROGRAM DETAIL ─────────────────────────────
function renderProgramDetail() {
  const prog = state.program;
  const div = document.createElement('div');
  div.className = 'main-content scroll-view';

  const backBtn = document.createElement('button');
  backBtn.className = 'back-btn';
  backBtn.innerHTML = `← Programs`;
  backBtn.addEventListener('click', () => { state.view = 'programs'; render(); });
  div.appendChild(backBtn);

  const header = document.createElement('div');
  header.style.cssText = 'padding:12px 20px 20px;';
  header.innerHTML = `
    <div style="font-size:32px;margin-bottom:8px;">${prog.icon}</div>
    <div class="page-title" style="font-size:24px;">${prog.name}</div>
    <div style="font-size:13px;color:var(--text-muted);margin-top:6px;line-height:1.5;">${prog.desc}</div>
  `;
  div.appendChild(header);

  const section = document.createElement('div');
  section.className = 'section';
  section.style.paddingTop = '0';

  const label = document.createElement('div');
  label.className = 'section-label';
  label.textContent = `${prog.days.length} Training Days`;
  section.appendChild(label);

  prog.days.forEach((day, i) => {
    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div class="day-number">D${i+1}</div>
      <div class="day-info">
        <div class="day-name">${day.name}</div>
        <div class="day-focus">${day.focus} · ${day.exercises.length} exercises</div>
      </div>
      <div class="day-arrow">›</div>
    `;
    card.addEventListener('click', () => startWorkout(prog, i));
    section.appendChild(card);
  });
  div.appendChild(section);
  div.appendChild(renderNav());
  return div;
}

// ── WORKOUT ────────────────────────────────────
function startWorkout(prog, dayIndex) {
  state.program = prog;
  state.dayIndex = dayIndex;
  state.exIndex = 0;
  state.setData = buildSetData(prog.days[dayIndex]);
  state.workoutStart = Date.now();
  state.view = 'workout';
  render();
}

function renderWorkout() {
  const prog = state.program;
  const day = prog.days[state.dayIndex];
  const exIndex = state.exIndex;

  const div = document.createElement('div');
  div.style.paddingBottom = '32px';

  // Header
  const pct = Math.round((exIndex / day.exercises.length) * 100);
  const hdr = document.createElement('div');
  hdr.className = 'workout-header';
  hdr.innerHTML = `
    <div class="workout-meta">${prog.name} · Day ${state.dayIndex + 1}</div>
    <div class="workout-title">${day.name}</div>
    <div class="workout-progress-bar">
      <div class="workout-progress-fill" style="width:${pct}%"></div>
    </div>
  `;
  div.appendChild(hdr);

  // Exercises
  day.exercises.forEach((ex, i) => {
    const isCurrent = i === exIndex;
    const isDone = i < exIndex;

    const card = document.createElement('div');
    card.className = 'exercise-card' + (isCurrent ? ' current' : isDone ? ' done-ex' : '');
    card.id = `ex-card-${i}`;

    const prev = state.prevWeights[ex.name];
    const prevHtml = prev
      ? `<div class="prev-weight">Last time: <strong>${prev.weight} lbs × ${prev.reps}</strong></div>`
      : '';

    // Build sets
    const sets = state.setData[i];
    const setsHtml = `
      <div class="set-col-headers">
        <div class="set-col-label">#</div>
        <div class="set-col-label">Weight<br>lbs</div>
        <div class="set-col-label">Reps</div>
        <div class="set-col-label">Done</div>
      </div>
    ` + sets.map((set, si) => `
      <div class="set-row" id="set-row-${i}-${si}">
        <div class="set-label">${si+1}</div>
        <select class="set-select${set.done ? ' done-set' : ''}"
          id="wt-${i}-${si}"
          onchange="onWeightChange(${i},${si})"
          ${!isCurrent || set.done ? 'disabled' : ''}
        >${buildWeightOptions(set.weight)}</select>
        <select class="set-select${set.done ? ' done-set' : ''}"
          id="rp-${i}-${si}"
          onchange="onRepsChange(${i},${si})"
          ${!isCurrent || set.done ? 'disabled' : ''}
        >${buildRepsOptions(set.reps)}</select>
        <button class="set-check${set.done ? ' checked' : ''}"
          id="chk-${i}-${si}"
          ${!isCurrent ? 'disabled' : ''}
          onclick="toggleSet(${i}, ${si})"
        >${set.done ? '✓' : '○'}</button>
      </div>
    `).join('');

    const allDone = sets.every(s => s.done);
    const isLast = i === day.exercises.length - 1;

    const actionBtn = (isCurrent && allDone)
      ? (isLast
          ? `<button class="btn-finish" onclick="finishWorkout()">🏁 FINISH WORKOUT</button>`
          : `<button class="btn-next-exercise" onclick="nextExercise()">NEXT EXERCISE →</button>`)
      : '';

    card.innerHTML = `
      <div class="exercise-header">
        <div>
          <div class="exercise-num">Exercise ${i+1} of ${day.exercises.length}</div>
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-note">${ex.notes}</div>
          <div style="margin-top:6px;font-size:12px;color:var(--text-dim);">${ex.sets} sets · ${ex.reps}</div>
        </div>
        <a href="${ex.video}" target="_blank" class="video-link">▶ Watch</a>
      </div>
      ${prevHtml}
      <div class="sets-area">${setsHtml}</div>
      ${actionBtn}
    `;

    div.appendChild(card);
  });

  // Scroll current card into view after render
  setTimeout(() => {
    const cur = document.getElementById(`ex-card-${exIndex}`);
    if (cur) cur.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);

  return div;
}

window.onWeightChange = function(exIdx, setIdx) {
  const val = document.getElementById(`wt-${exIdx}-${setIdx}`)?.value || '';
  state.setData[exIdx][setIdx].weight = val;
  // Cascade to all subsequent undone sets
  const total = state.setData[exIdx].length;
  for (let si = setIdx + 1; si < total; si++) {
    if (!state.setData[exIdx][si].done) {
      state.setData[exIdx][si].weight = val;
      const el = document.getElementById(`wt-${exIdx}-${si}`);
      if (el) el.value = val;
    }
  }
};

window.onRepsChange = function(exIdx, setIdx) {
  const val = document.getElementById(`rp-${exIdx}-${setIdx}`)?.value || '';
  state.setData[exIdx][setIdx].reps = val;
  // Cascade to all subsequent undone sets
  const total = state.setData[exIdx].length;
  for (let si = setIdx + 1; si < total; si++) {
    if (!state.setData[exIdx][si].done) {
      state.setData[exIdx][si].reps = val;
      const el = document.getElementById(`rp-${exIdx}-${si}`);
      if (el) el.value = val;
    }
  }
};

window.toggleSet = function(exIdx, setIdx) {
  const wt = document.getElementById(`wt-${exIdx}-${setIdx}`)?.value || '';
  const rp = document.getElementById(`rp-${exIdx}-${setIdx}`)?.value || '';
  const set = state.setData[exIdx][setIdx];
  set.weight = wt;
  set.reps = rp;
  set.done = !set.done;

  if (set.done) {
    startRest(90);
  }

  reRenderWorkout();
};

window.nextExercise = function() {
  state.exIndex++;
  reRenderWorkout();
  setTimeout(() => {
    const cur = document.getElementById(`ex-card-${state.exIndex}`);
    if (cur) cur.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
};

window.finishWorkout = function() {
  const day = state.program.days[state.dayIndex];
  const duration = Date.now() - state.workoutStart;

  // Build exercise log
  const exercises = {};
  day.exercises.forEach((ex, i) => {
    exercises[ex.name] = { sets: state.setData[i] };
  });

  // Update prevWeights from this session
  Object.entries(exercises).forEach(([name, ex]) => {
    const doneSets = ex.sets.filter(s => s.done && s.weight);
    if (doneSets.length) {
      const best = doneSets.reduce((a,b) => (+b.weight > +a.weight ? b : a));
      state.prevWeights[name] = { weight: best.weight, reps: best.reps };
    }
  });

  const session = {
    programId: state.program.id,
    programName: state.program.name,
    dayIndex: state.dayIndex,
    dayName: day.name,
    startedAt: state.workoutStart,
    completedAt: Date.now(),
    duration,
    exercises
  };

  saveSession(session);
  state.workoutSessions.unshift(session);
  state.view = 'complete';
  render();
};

function reRenderWorkout() {
  const root = document.getElementById('app');
  root.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.appendChild(renderWorkout());
  if (state.restActive) wrap.appendChild(renderRest());
  root.appendChild(wrap);
}

// ── REST TIMER ─────────────────────────────────
function startRest(seconds) {
  if (state.restTimer) clearInterval(state.restTimer);
  state.restSeconds = seconds;
  state.restActive = true;

  const overlay = document.createElement('div');
  overlay.className = 'rest-overlay';
  overlay.id = 'rest-overlay';
  overlay.innerHTML = `
    <div class="rest-label">REST</div>
    <div class="rest-timer" id="rest-count">${seconds}</div>
    <div class="rest-next">Take a breath. Next set coming.</div>
    <button class="rest-skip" onclick="skipRest()">Skip →</button>
  `;
  document.getElementById('app').appendChild(overlay);

  state.restTimer = setInterval(() => {
    state.restSeconds--;
    const el = document.getElementById('rest-count');
    if (el) el.textContent = state.restSeconds;
    if (state.restSeconds <= 0) {
      skipRest();
    }
  }, 1000);
}

window.skipRest = function() {
  if (state.restTimer) clearInterval(state.restTimer);
  state.restActive = false;
  const overlay = document.getElementById('rest-overlay');
  if (overlay) overlay.remove();
};

// ── COMPLETE ───────────────────────────────────
function renderComplete() {
  const session = state.workoutSessions[0];
  const totalSets = Object.values(session.exercises || {}).reduce((acc, ex) => acc + ex.sets.filter(s => s.done).length, 0);

  const div = document.createElement('div');
  div.className = 'complete-screen';
  div.innerHTML = `
    <div class="complete-icon">🏁</div>
    <div class="complete-title">Session Done.</div>
    <div class="complete-sub">${session.dayName}</div>
    <div class="complete-stats">
      <div class="hero-stat">
        <div class="complete-stat-val">${formatDuration(session.duration)}</div>
        <div class="complete-stat-label">Time</div>
      </div>
      <div class="hero-stat">
        <div class="complete-stat-val">${totalSets}</div>
        <div class="complete-stat-label">Sets Done</div>
      </div>
    </div>
    <button class="btn-done" onclick="goDone()">Back to Home</button>
  `;
  return div;
}

window.goDone = function() {
  state.view = 'home';
  render();
};

// ── HISTORY ────────────────────────────────────
function renderHistory() {
  const div = document.createElement('div');
  div.className = 'main-content scroll-view';
  div.innerHTML = `<div class="page-header" style="padding-bottom:20px;"><div class="page-title">History</div></div>`;

  const section = document.createElement('div');
  section.className = 'section';
  section.style.paddingTop = '0';

  if (!state.workoutSessions.length) {
    section.innerHTML = `<div class="history-empty">No sessions yet.<br>Complete your first workout to see history here.</div>`;
  } else {
    state.workoutSessions.forEach(s => {
      const card = document.createElement('div');
      card.className = 'history-session';
      const exHtml = Object.entries(s.exercises || {}).map(([name, ex]) => {
        const doneSets = ex.sets.filter(s => s.done);
        if (!doneSets.length) return '';
        const tags = doneSets.map(set => `<span class="history-set-tag">${set.weight ? set.weight + 'lb' : ''} × ${set.reps || '—'}</span>`).join('');
        return `<div class="history-ex"><div class="history-ex-name">${name}</div><div class="history-sets">${tags}</div></div>`;
      }).join('');

      card.innerHTML = `
        <div class="history-session-header">
          <div>
            <div class="history-session-name">${s.dayName}</div>
            <div class="history-session-date">${formatDate(s.startedAt)} · ${s.programName}</div>
          </div>
          <div class="history-session-dur">${formatDuration(s.duration || 0)}</div>
        </div>
        ${exHtml}
      `;
      section.appendChild(card);
    });
  }

  div.appendChild(section);
  return div;
}

// ── PROFILE ────────────────────────────────────
function renderProfile() {
  const div = document.createElement('div');
  div.className = 'main-content scroll-view';
  div.innerHTML = `<div class="page-header" style="padding-bottom:20px;"><div class="page-title">Profile</div></div>`;

  const section = document.createElement('div');
  section.className = 'section';
  section.style.paddingTop = '0';

  const total = state.workoutSessions.length;
  const streak = getStreak(state.workoutSessions);
  const totalTime = state.workoutSessions.reduce((a,s) => a + (s.duration||0), 0);

  section.innerHTML += `
    <div class="section-label">Stats</div>
    <div class="profile-stat-grid">
      <div class="profile-stat"><div class="profile-stat-val">${total}</div><div class="profile-stat-label">Sessions</div></div>
      <div class="profile-stat"><div class="profile-stat-val">${streak}</div><div class="profile-stat-label">Streak</div></div>
      <div class="profile-stat"><div class="profile-stat-val">${Math.round(totalTime/3600000)}h</div><div class="profile-stat-label">Total Time</div></div>
      <div class="profile-stat"><div class="profile-stat-val">${Object.keys(state.prevWeights).length}</div><div class="profile-stat-label">Exercises Logged</div></div>
    </div>
  `;

  // PRs
  const prs = Object.entries(state.prevWeights).filter(([,v]) => v.weight);
  if (prs.length) {
    const prSection = document.createElement('div');
    prSection.innerHTML = `<div class="section-label" style="margin-top:16px;">Personal Records</div>`;
    const card = document.createElement('div');
    card.className = 'card';
    prs.forEach(([name, val]) => {
      card.innerHTML += `
        <div class="pr-item">
          <div class="pr-name">${name}</div>
          <div class="pr-val">${val.weight} lbs × ${val.reps}</div>
        </div>
      `;
    });
    prSection.appendChild(card);
    section.appendChild(prSection);
  }

  div.appendChild(section);
  return div;
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
if (localStorage.getItem('dp-auth') === '1') {
  state.authed = true;
  loadSessions(sessions => {
    state.workoutSessions = sessions;
    state.prevWeights = buildPrevWeights(sessions);
    state.view = 'home';
    render();
  });
} else {
  render();
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
