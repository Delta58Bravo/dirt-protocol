<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dirt Protocol</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dirt Protocol">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --surface2: #1E1E1E;
      --surface3: #282828;
      --border: #2A2A2A;
      --orange: #F97316;
      --orange-dim: #C2570F;
      --orange-glow: rgba(249,115,22,0.15);
      --text: #F5F5F5;
      --text-muted: #888;
      --text-dim: #555;
      --green: #22C55E;
      --red: #EF4444;
      --blue: #3B82F6;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overscroll-behavior: none;
      overflow-x: hidden;
      width: 100%;
    }

    #app { min-height: 100vh; }

    /* ── LOGIN ── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(ellipse at 50% 0%, rgba(249,115,22,0.08) 0%, var(--bg) 70%);
    }
    .login-card {
      width: 100%;
      max-width: 360px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .login-logo .wordmark {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--text);
    }
    .login-logo .wordmark span { color: var(--orange); }
    .login-logo .tagline {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .login-card input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-size: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      outline: none;
      margin-bottom: 12px;
    }
    .login-card input:focus { border-color: var(--orange); }
    .login-card button {
      width: 100%;
      background: var(--orange);
      color: #000;
      font-size: 15px;
      font-weight: 700;
      padding: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .login-card button:active { background: var(--orange-dim); }
    .login-err { color: var(--red); font-size: 13px; margin-bottom: 10px; }

    /* ── NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 0 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      gap: 4px;
      transition: color 0.15s;
    }
    .nav-btn.active { color: var(--orange); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* ── MAIN LAYOUT ── */
    .main-content {
      padding-bottom: calc(64px + env(safe-area-inset-bottom));
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .page-header {
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    .page-title span { color: var(--orange); }

    /* ── SECTION ── */
    .section { padding: 20px 20px 0; }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-orange {
      background: var(--orange-glow);
      border-color: rgba(249,115,22,0.3);
    }

    /* ── HOME ── */
    .hero-card {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .hero-card::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-greeting {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .hero-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }
    .hero-stats {
      display: flex;
      gap: 16px;
    }
    .hero-stat {
      display: flex;
      flex-direction: column;
    }
    .hero-stat-val {
      font-size: 22px;
      font-weight: 900;
      color: var(--orange);
    }
    .hero-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .next-up-card {
      background: var(--orange-glow);
      border: 1px solid rgba(249,115,22,0.25);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      active: opacity 0.8;
    }
    .next-up-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 6px;
    }
    .next-up-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .next-up-sub {
      font-size: 13px;
      color: var(--text-muted);
    }
    .btn-start {
      width: 100%;
      background: var(--orange);
      color: #000;
      font-size: 15px;
      font-weight: 800;
      padding: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-top: 12px;
    }
    .btn-start:active { opacity: 0.85; }

    .recent-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .recent-item:last-child { border-bottom: none; }
    .recent-name { font-size: 14px; font-weight: 600; }
    .recent-date { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .recent-badge {
      font-size: 11px;
      font-weight: 700;
      background: var(--orange-glow);
      color: var(--orange);
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid rgba(249,115,22,0.2);
    }

    /* ── PROGRAMS ── */
    .program-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .program-card:active { border-color: var(--orange); }
    .program-icon { font-size: 28px; margin-bottom: 10px; }
    .program-name { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
    .program-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.4; }
    .program-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 5px;
      background: var(--surface3);
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .tag-orange { background: var(--orange-glow); color: var(--orange); }

    /* ── DAY LIST (program detail) ── */
    .back-btn {
      background: none;
      border: none;
      color: var(--orange);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 20px 20px 0;
    }
    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s;
    }
    .day-card:active { border-color: var(--orange); }
    .day-card.completed { border-color: rgba(34,197,94,0.3); }
    .day-number {
      width: 40px; height: 40px;
      background: var(--surface3);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      color: var(--orange);
      flex-shrink: 0;
    }
    .day-number.done { background: rgba(34,197,94,0.15); color: var(--green); }
    .day-info { flex: 1; }
    .day-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .day-focus { font-size: 12px; color: var(--text-muted); }
    .day-arrow { color: var(--text-dim); font-size: 18px; }

    /* ── ACTIVE WORKOUT ── */
    .workout-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .workout-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
    .workout-title { font-size: 18px; font-weight: 900; }
    .workout-progress-bar {
      height: 3px;
      background: var(--surface3);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }
    .workout-progress-fill {
      height: 100%;
      background: var(--orange);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .exercise-card {
      margin: 16px 16px 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .exercise-card.current { border-color: var(--orange); }
    .exercise-card.done-ex { border-color: rgba(34,197,94,0.4); opacity: 0.7; }

    .exercise-header {
      padding: 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .exercise-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2px;
    }
    .exercise-name { font-size: 17px; font-weight: 800; }
    .exercise-note { font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
    .video-link {
      color: var(--orange);
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .prev-weight {
      margin: 0 16px;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .prev-weight strong { color: var(--text); }

    .sets-area { padding: 12px 16px 16px; }

    /* Column headers */
    .set-col-headers {
      display: grid;
      grid-template-columns: 28px 1fr 1fr 48px;
      gap: 8px;
      margin-bottom: 6px;
      padding: 0 2px;
    }
    .set-col-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.2;
    }

    .set-row {
      display: grid;
      grid-template-columns: 28px 1fr 1fr 48px;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    .set-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      text-align: center;
    }
    .set-select {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-size: 17px;
      font-weight: 700;
      padding: 12px 4px;
      border-radius: 10px;
      text-align: center;
      text-align-last: center;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      outline: none;
    }
    .set-select:focus { border-color: var(--orange); }
    .set-select.done-set {
      background: rgba(34,197,94,0.08);
      border-color: rgba(34,197,94,0.3);
      color: var(--green);
    }
    .set-select:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .set-select.suggested {
      color: var(--text-dim);
      border-color: var(--border);
      border-style: dashed;
      opacity: 0.6;
    }
    .set-check {
      width: 48px; height: 48px;
      background: var(--surface3);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
    }
    .set-check.checked {
      background: rgba(34,197,94,0.15);
      color: var(--green);
    }

    .btn-next-exercise {
      margin: 12px 16px 16px;
      width: calc(100% - 32px);
      background: var(--orange);
      color: #000;
      font-size: 14px;
      font-weight: 800;
      padding: 13px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .btn-next-exercise:active { opacity: 0.85; }
    .btn-finish {
      margin: 12px 16px 16px;
      width: calc(100% - 32px);
      background: var(--green);
      color: #000;
      font-size: 14px;
      font-weight: 800;
      padding: 13px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    /* REST TIMER */
    .rest-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .rest-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .rest-timer {
      font-size: 80px;
      font-weight: 900;
      color: var(--orange);
      letter-spacing: -3px;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }
    .rest-next {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .rest-skip {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      padding: 12px 32px;
      border-radius: 10px;
      cursor: pointer;
    }

    /* WORKOUT COMPLETE */
    .complete-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      background: radial-gradient(ellipse at 50% 30%, rgba(249,115,22,0.1) 0%, var(--bg) 70%);
    }
    .complete-icon { font-size: 64px; margin-bottom: 24px; }
    .complete-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
    .complete-sub { font-size: 15px; color: var(--text-muted); margin-bottom: 32px; }
    .complete-stats {
      display: flex;
      gap: 24px;
      margin-bottom: 40px;
    }
    .complete-stat-val { font-size: 28px; font-weight: 900; color: var(--orange); }
    .complete-stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .btn-done {
      background: var(--orange);
      color: #000;
      font-size: 16px;
      font-weight: 800;
      padding: 16px 48px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    /* ── BLOCK BANNER ── */
    .block-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .block-banner-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .block-name {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--orange);
    }
    .block-week-label {
      font-size: 12px;
      color: var(--text-muted);
    }
    .block-progress-bar {
      height: 6px;
      background: var(--surface3);
      border-radius: 3px;
      overflow: hidden;
    }
    .block-progress-fill {
      height: 100%;
      background: var(--orange);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* ── CALENDAR ── */
    .cal-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-nav-btn {
      background: var(--surface2);
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-month-label {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-hdr {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-dim);
      padding-bottom: 6px;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      border-radius: 50%;
      position: relative;
    }
    .cal-day.cal-trained {
      background: var(--orange);
      color: #000;
      font-weight: 800;
    }
    .cal-day.cal-today {
      border: 2px solid var(--orange);
      color: var(--text);
    }
    .cal-day.cal-today.cal-trained {
      border: 2px solid #fff;
    }
    .cal-day.cal-future {
      opacity: 0.25;
    }
    .cal-legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .cal-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .cal-legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }
    .stat-box-val {
      font-size: 24px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
    }
    .stat-box-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* ── PROFILE ── */
    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900; color: #000;
      flex-shrink: 0;
    }
    .profile-hero {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .profile-hero-info { flex: 1; min-width: 0; }
    .profile-hero-name {
      font-size: 22px; font-weight: 900; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .profile-hero-meta {
      font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.5;
    }
    .profile-hero-goal {
      font-size: 13px; color: var(--orange); margin-top: 6px; font-weight: 700;
    }
    .btn-edit-profile {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px; font-weight: 700;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .profile-edit-form {
      background: var(--surface);

// ════════════════════════════════════════════════
//  FIREBASE HELPERS
// ════════════════════════════════════════════════
function dbRef(path) {
  if (!db) return null;
  return db.ref('ryan/' + path);
}

function saveSession(session) {
  const ref = dbRef('sessions');
  if (!ref) return;
  ref.push(session);
}

function loadSessions(callback) {
  const ref = dbRef('sessions');
  if (!ref) { callback([]); return; }
  ref.orderByChild('startedAt').limitToLast(200).once('value', snap => {
    const sessions = [];
    snap.forEach(child => sessions.unshift({ id: child.key, ...child.val() }));
    callback(sessions);
  });
}

function loadMeta(callback) {
  const ref = dbRef('meta');
  if (!ref) { callback({}); return; }
  ref.once('value', snap => callback(snap.val() || {}));
}

function saveMeta(data) {
  const ref = dbRef('meta');
  if (!ref) return;
  ref.update(data);
}

function loadProfile(callback) {
  const ref = dbRef('profile');
  if (!ref) { callback({}); return; }
  ref.once('value', snap => callback(snap.val() || {}));
}

function saveProfile(data) {
  const ref = dbRef('profile');
  if (!ref) return;
  ref.update(data);
}

function buildPrevWeights(sessions) {
  const prev = {};
  // sessions is newest-first after the unshift
  for (const s of sessions) {
    if (!s.exercises) continue;
    for (const [name, ex] of Object.entries(s.exercises)) {
      if (!prev[name] && ex.sets && ex.sets.length) {
        const doneSets = ex.sets.filter(s => s.done && s.weight);
        if (doneSets.length) {
          const best = doneSets.reduce((a,b) => (b.weight > a.weight ? b : a));
          prev[name] = { weight: best.weight, reps: best.reps };
        }
      }
    }
  }
  return prev;
}

function extractDefaultReps(repsStr) {
  const match = repsStr.match(/\d+/);
  return match ? match[0] : '10';
}

function buildWeightOptions(selected) {
  let html = '<option value="">—</option>';
  // 0 to 100 in 2.5 lb steps
  for (let w = 0; w <= 100; w += 2.5) {
    const v = (w % 1 === 0) ? String(w) : w.toFixed(1);
    html += `<option value="${v}"${String(selected) === v ? ' selected' : ''}>${v}</option>`;
  }
  // 105 to 300 in 5 lb steps
  for (let w = 105; w <= 300; w += 5) {
    html += `<option value="${w}"${String(selected) === String(w) ? ' selected' : ''}>${w}</option>`;
  }
  return html;
}

function buildRepsOptions(selected) {

  for (let r = 1; r <= 50; r++) {

  return html;
}

// ── AUDIO / HAPTIC ───────────────────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, dur, vol = 0.35, type = 'sine') {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur / 1000);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur / 1000);
  } catch(e) {}
}
function playRestDone() {
  // Three ascending beeps — unmistakable
  playTone(660, 120, 0.4);
  setTimeout(() => playTone(770, 120, 0.4), 160);
  setTimeout(() => playTone(880, 220, 0.5), 320);
  if (navigator.vibrate) navigator.vibrate([80, 60, 80, 60, 180]);
}
function playSetLogged() {
  playTone(523, 80, 0.2); // soft confirm blip
  if (navigator.vibrate) navigator.vibrate(40);
}
// Unlock AudioContext on first touch (iOS requirement)
document.addEventListener('touchstart', () => { try { getAudioCtx().resume(); } catch(e) {} }, { once: true });

// ── ALL-TIME PR BUILDER ───────────────────────────
function buildAllTimePRs(sessions) {
  const prs = {};
  // sessions newest-first — iterate all to find true all-time best
  const reversed = [...sessions].reverse(); // oldest first
  reversed.forEach(s => {
    if (!s.exercises) return;
    const date = formatDate(s.startedAt);
    Object.entries(s.exercises).forEach(([name, ex]) => {
      const doneSets = (ex.sets || []).filter(s => s.done && s.weight);
      if (!doneSets.length) return;
      const best = doneSets.reduce((a,b) => (+b.weight > +a.weight ? b : a));
      if (!prs[name] || +best.weight > +prs[name].weight) {
        prs[name] = { weight: best.weight, reps: best.reps, date };
      }
    });
  });
  return prs;
}

function detectNewPRs(exercises, prevPRs) {
  const newPRs = [];
  Object.entries(exercises).forEach(([name, ex]) => {
    const doneSets = (ex.sets || []).filter(s => s.done && s.weight);
    if (!doneSets.length) return;
    const best = doneSets.reduce((a,b) => (+b.weight > +a.weight ? b : a));
    if (!prevPRs[name] || +best.weight > +prevPRs[name].weight) {
      newPRs.push(name);
    }
  });
  return newPRs;
}

// ── BLOCK HELPERS ────────────────────────────────
const BLOCK_WEEKS = 8;

function initBlock(programId) {
  const today = new Date().toISOString().split('T')[0];
  const meta = { programId, startDate: today, weekNumber: 1 };
  state.blockMeta = meta;
  saveMeta({ currentBlock: meta, activeProgramId: programId, activeDayIdx: 0 });
}

function advanceBlock() {
  // Called when all days in a program cycle are complete
  const meta = state.blockMeta || {};
  const newWeek = (meta.weekNumber || 0) + 1;
  const updated = { ...meta, weekNumber: newWeek };
  state.blockMeta = updated;
  saveMeta({ currentBlock: updated, activeDayIdx: 0 });
  return newWeek;
}

function thisWeekCount(sessions) {
  const startOfWeek = (() => {
    const d = new Date();
    const day = d.getDay(); // 0 = Sun
    d.setDate(d.getDate() - ((day + 6) % 7)); // back to Monday
    d.setHours(0,0,0,0);
    return d.getTime();
  })();
  return sessions.filter(s => s.startedAt >= startOfWeek).length;
}

// ── CALENDAR HELPERS ─────────────────────────────
function buildTrainingSet(sessions, year, month) {
  const set = new Set();
  sessions.forEach(s => {
    const d = new Date(s.startedAt);
    if (d.getFullYear() === year && d.getMonth() === month) set.add(d.getDate());
  });
  return set;
}

function renderCalendarHTML(sessions, monthDate) {
  const year = monthDate.getFullYear();
  const month = monthDate.getMonth();
  const today = new Date();
  const trained = buildTrainingSet(sessions, year, month);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7; // Mon=0
  const monthLabel = monthDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  let cells = ['M','T','W','T','F','S','S'].map(d => `<div class="cal-hdr">${d}</div>`).join('');
  for (let i = 0; i < firstDow; i++) cells += '<div></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = year === today.getFullYear() && month === today.getMonth() && d === today.getDate();
    const isFuture = new Date(year, month, d) > today;
    const wasTrained = trained.has(d);
    let cls = 'cal-day';
    if (wasTrained) cls += ' cal-trained';
    if (isToday) cls += ' cal-today';
    if (isFuture) cls += ' cal-future';
    cells += `<div class="${cls}">${d}</div>`;
  }

  return `
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calPrev()">◀</button>
        <div class="cal-month-label">${monthLabel}</div>
        <button class="cal-nav-btn" onclick="calNext()">▶</button>
      </div>
      <div class="cal-grid">${cells}</div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--orange);"></div>Trained</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="border:2px solid var(--orange);"></div>Today</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--surface3);"></div>Rest</div>
      </div>
    </div>
  `;
}

// ── CSV EXPORT ────────────────────────────────────
function exportCSV(sessions) {
  const rows = [['Date','Program','Day','Exercise','Set','Weight (lbs)','Reps']];
  sessions.forEach(s => {
    const date = new Date(s.startedAt).toLocaleDateString('en-US', { year:'numeric', month:'2-digit', day:'2-digit' });
    Object.entries(s.exercises || {}).forEach(([name, ex]) => {
      (ex.sets || []).forEach((set, i) => {
        if (set.done) {
          rows.push([date, s.programName, s.dayName, name, i+1, set.weight || '', set.reps || '']);
        }
      });
    });
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `dirt-protocol-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatDuration(ms) {
  const m = Math.round(ms / 60000);
  return m + ' min';
}

function formatTotalTime(ms) {
  const totalMin = Math.round(ms / 60000);
  if (totalMin < 60) return totalMin + 'm';
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return m > 0 ? h + 'h ' + m + 'm' : h + 'h';
}

function daysSince(ts) {
  return Math.floor((Date.now() - ts) / 86400000);
}

function getStreak(sessions) {
  if (!sessions.length) return 0;
  let streak = 0;
  let lastDay = Math.floor(Date.now() / 86400000);
  for (const s of sessions) {
    const sDay = Math.floor(s.startedAt / 86400000);
    if (lastDay - sDay <= 1) { streak++; lastDay = sDay; }
    else break;
  }
  return streak;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return "Good morning";
  if (h < 17) return "Good afternoon";
  return "Good evening";
}

function buildSetData(day) {
  const data = {};
  day.exercises.forEach((ex, i) => {
    const prevW = state.prevWeights[ex.name]?.weight || '';
    const defaultR = extractDefaultReps(ex.reps);
    // All sets start "suggested" — user confirms when they log each set
    data[i] = Array.from({ length: ex.sets }, () => ({
      weight: String(prevW),
      reps: String(defaultR),
      weightSuggested: true,
      repsSuggested: true,
      done: false
    }));
  });
  return data;
}

    case 'workout':        wrap.appendChild(renderWorkout()); break;

  hdr.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <button onclick="exitWorkout()" style="background:none;border:none;color:var(--text-muted);font-size:13px;font-weight:700;padding:4px 0;cursor:pointer;letter-spacing:0.5px;">← Exit</button>
      <div style="font-size:11px;color:var(--text-dim);letter-spacing:0.5px;">Sets lock on ✓ · FINISH saves</div>
    </div>
    <div class="workout-meta">${prog.name} · Day ${state.dayIndex + 1}</div>
    <div class="workout-title">${day.name}</div>
    <div class="workout-progress-bar">
      <div class="workout-progress-fill" style="width:${pct}%"></div>
    </div>
  `;
  div.appendChild(hdr);

  // Exercises
  day.exercises.forEach((ex, i) => {
    const isCurrent = i === exIndex;
    const isDone = i < exIndex;

    const card = document.createElement('div');
    card.className = 'exercise-card' + (isCurrent ? ' current' : isDone ? ' done-ex' : '');
    card.id = `ex-card-${i}`;

    const prev = state.prevWeights[ex.name];
    const prevHtml = prev
      ? `<div class="prev-weight">Last time: <strong>${prev.weight} lbs × ${prev.reps}</strong></div>`
      : '';

    // Build sets
    const sets = state.setData[i];
    const setsHtml = `
      <div class="set-col-headers">
        <div class="set-col-label">#</div>
        <div class="set-col-label">Weight<br>lbs</div>
        <div class="set-col-label">Reps</div>
        <div class="set-col-label">Done</div>
      </div>
    ` + sets.map((set, si) => {
      const wtClass = set.done ? ' done-set' : (set.weightSuggested ? ' suggested' : '');
      const rpClass = set.done ? ' done-set' : (set.repsSuggested ? ' suggested' : '');
      return `
      <div class="set-row" id="set-row-${i}-${si}">
        <div class="set-label">${si+1}</div>
        <select class="set-select${wtClass}"
          id="wt-${i}-${si}"
          onchange="onWeightChange(${i},${si})"
          ${!isCurrent || set.done ? 'disabled' : ''}
        >${buildWeightOptions(set.weight)}</select>
        <select class="set-select${rpClass}"
          id="rp-${i}-${si}"
          onchange="onRepsChange(${i},${si})"
          ${!isCurrent || set.done ? 'disabled' : ''}
        >${buildRepsOptions(set.reps)}</select>
        <button class="set-check${set.done ? ' checked' : ''}"
          id="chk-${i}-${si}"
          ${!isCurrent ? 'disabled' : ''}
          onclick="toggleSet(${i}, ${si})"
        >${set.done ? '✓' : '○'}</button>
      </div>
    `}).join('');

    const allDone = sets.every(s => s.done);
    const isLast = i === day.exercises.length - 1;

    const doneSets = sets.filter(s => s.done).length;
    const actionBtn = (isCurrent && allDone)
      ? (isLast
          ? `<button class="btn-finish" onclick="finishWorkout()">🏁 FINISH WORKOUT</button>`
          : `<button class="btn-next-exercise" onclick="nextExercise()">NEXT EXERCISE →</button>`)
      : (isCurrent && !allDone
          ? `<div style="text-align:center;font-size:12px;color:var(--text-dim);padding:10px 0 2px;letter-spacing:0.5px;">${doneSets} of ${sets.length} sets done — mark all ✓ to continue</div>`
          : '');

    card.innerHTML = `
      <div class="exercise-header">
        <div>
          <div class="exercise-num">Exercise ${i+1} of ${day.exercises.length}</div>
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-note">${ex.notes}</div>
          <div style="margin-top:6px;font-size:12px;color:var(--text-dim);">${ex.sets} sets · ${ex.reps}</div>
        </div>
        <a href="${ex.video}" target="_blank" class="video-link">▶ Watch</a>
      </div>
      ${prevHtml}
      <div class="sets-area">${setsHtml}</div>
      ${actionBtn}
    `;

    div.appendChild(card);
  });

  // Scroll current card into view after render
  setTimeout(() => {
    const cur = document.getElementById(`ex-card-${exIndex}`);
    if (cur) cur.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);

  return div;
}

window.onWeightChange = function(exIdx, setIdx) {
  const val = document.getElementById(`wt-${exIdx}-${setIdx}`)?.value || '';
  // Mark this set as user-confirmed (not suggested)
  state.setData[exIdx][setIdx].weight = val;
  state.setData[exIdx][setIdx].weightSuggested = false;
  const thisEl = document.getElementById(`wt-${exIdx}-${setIdx}`);
  if (thisEl) thisEl.classList.remove('suggested');
  // Cascade as suggested to subsequent undone sets
  const total = state.setData[exIdx].length;
  for (let si = setIdx + 1; si < total; si++) {
    if (!state.setData[exIdx][si].done) {
      state.setData[exIdx][si].weight = val;
      state.setData[exIdx][si].weightSuggested = true;
      const el = document.getElementById(`wt-${exIdx}-${si}`);
      if (el) { el.value = val; el.classList.add('suggested'); }
    }
  }
};

window.onRepsChange = function(exIdx, setIdx) {
  const val = document.getElementById(`rp-${exIdx}-${setIdx}`)?.value || '';
  // Mark this set as user-confirmed
  state.setData[exIdx][setIdx].reps = val;
  state.setData[exIdx][setIdx].repsSuggested = false;
  const thisEl = document.getElementById(`rp-${exIdx}-${setIdx}`);
  if (thisEl) thisEl.classList.remove('suggested');
  // Cascade as suggested to subsequent undone sets
  const total = state.setData[exIdx].length;
  for (let si = setIdx + 1; si < total; si++) {
    if (!state.setData[exIdx][si].done) {
      state.setData[exIdx][si].reps = val;
      state.setData[exIdx][si].repsSuggested = true;
      const el = document.getElementById(`rp-${exIdx}-${si}`);
      if (el) { el.value = val; el.classList.add('suggested'); }
    }
  }
};

window.toggleSet = function(exIdx, setIdx) {
  const wt = document.getElementById(`wt-${exIdx}-${setIdx}`)?.value || '';
  const rp = document.getElementById(`rp-${exIdx}-${setIdx}`)?.value || '';
  const set = state.setData[exIdx][setIdx];
  set.weight = wt;
  set.reps = rp;
  // Confirming a set locks it in — no longer suggested
  set.weightSuggested = false;
  set.repsSuggested = false;
  set.done = !set.done;

  reRenderWorkout();

  if (set.done) {
    playSetLogged();
    startRest(90);
  }
};

window.nextExercise = function() {
  state.exIndex++;
  reRenderWorkout();
  setTimeout(() => {
    const cur = document.getElementById(`ex-card-${state.exIndex}`);
    if (cur) cur.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
};

window.finishWorkout = function() {
  const day = state.program.days[state.dayIndex];
  const duration = Date.now() - state.workoutStart;

  // Build exercise log
  const exercises = {};
  day.exercises.forEach((ex, i) => {
    exercises[ex.name] = { sets: state.setData[i] };
  });

  // Detect new PRs before updating state
  state.sessionNewPRs = detectNewPRs(exercises, state.allTimePRs);

  // Update prevWeights + allTimePRs from this session
  const today = formatDate(Date.now());
  Object.entries(exercises).forEach(([name, ex]) => {
    const doneSets = ex.sets.filter(s => s.done && s.weight);
    if (doneSets.length) {
      const best = doneSets.reduce((a,b) => (+b.weight > +a.weight ? b : a));
      state.prevWeights[name] = { weight: best.weight, reps: best.reps };
      if (!state.allTimePRs[name] || +best.weight > +state.allTimePRs[name].weight) {
        state.allTimePRs[name] = { weight: best.weight, reps: best.reps, date: today };
      }
    }
  });

  // Reset rating/notes for this session
  state.sessionRating = 0;
  state.sessionNotes = '';
  state.pendingSessionKey = null;

  const session = {
    programId: state.program.id,
    programName: state.program.name,
    dayIndex: state.dayIndex,
    dayName: day.name,
    startedAt: state.workoutStart,
    completedAt: Date.now(),
    duration,
    exercises
  };

  // Save and capture the Firebase key so we can attach rating/notes after
  const sessRef = dbRef('sessions');
  if (sessRef) {
    const pushed = sessRef.push(session);
    state.pendingSessionKey = pushed.key;
    session.id = pushed.key;
  }
  state.workoutSessions.unshift(session);

  // Block advancement: if we just finished the last day of the program, tick the week
  const prog = state.program;
  const isLastDay = (state.dayIndex === prog.days.length - 1);
  if (isLastDay) {
    const newWeek = advanceBlock();
    if (newWeek > BLOCK_WEEKS) {
      // Block complete — reset to week 1, let user decide on program
      const resetMeta = { programId: prog.id, startDate: new Date().toISOString().split('T')[0], weekNumber: 1 };
      state.blockMeta = resetMeta;
      saveMeta({ currentBlock: resetMeta, activeDayIdx: 0 });
    }
  } else {
    saveMeta({ activeProgramId: prog.id, activeDayIdx: state.dayIndex + 1 });
    if (!state.blockMeta) initBlock(prog.id);
  }

  state.view = 'complete';
  render();
};

window.exitWorkout = function() {
  // Check if any sets have been logged
  const anyDone = Object.values(state.setData).some(sets => sets.some(s => s.done));
  if (anyDone) {
    if (!confirm('Exit workout? Sets logged so far won\'t be saved to history.')) return;
  }
  if (state.restTimer) clearInterval(state.restTimer);
  state.restActive = false;
  state.view = 'home';
  render();
};

function reRenderWorkout() {
  const root = document.getElementById('app');
  root.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.appendChild(renderWorkout());
  if (state.restActive) wrap.appendChild(renderRest());
  root.appendChild(wrap);
}

// ── REST TIMER ─────────────────────────────────
function renderRest() {
  const overlay = document.createElement('div');
  overlay.className = 'rest-overlay';
  overlay.id = 'rest-overlay';
  overlay.innerHTML = `
    <div class="rest-label">REST</div>
    <div class="rest-timer" id="rest-count">${state.restSeconds}</div>
    <div class="rest-next">Take a breath. Next set coming.</div>
    <button class="rest-skip" onclick="skipRest()">Skip →</button>
  `;
  return overlay;
}

function startRest(seconds) {
  if (state.restTimer) clearInterval(state.restTimer);
  state.restSeconds = seconds;
  state.restActive = true;
  document.getElementById('app').appendChild(renderRest());

  state.restTimer = setInterval(() => {
    state.restSeconds--;
    const el = document.getElementById('rest-count');
    if (el) el.textContent = state.restSeconds;
    if (state.restSeconds <= 0) {
      playRestDone();
      skipRest();
    }
  }, 1000);
}

window.skipRest = function() {
  if (state.restTimer) clearInterval(state.restTimer);
  state.restActive = false;
  const overlay = document.getElementById('rest-overlay');
  if (overlay) overlay.remove();
};

// ── COMPLETE ───────────────────────────────────
function renderComplete() {
  const session = state.workoutSessions[0];
  const totalSets = Object.values(session.exercises || {}).reduce((acc, ex) => acc + ex.sets.filter(s => s.done).length, 0);
  const prog = state.program;
  const isLastDay = state.dayIndex === prog.days.length - 1;
  const block = state.blockMeta;
  const newPRs = state.sessionNewPRs || [];

  const div = document.createElement('div');
  div.className = 'complete-screen';
  div.style.paddingBottom = '48px';

  // PR banner
  const prBanner = newPRs.length
    ? `<div class="complete-pr-banner">🏅 New PR${newPRs.length > 1 ? 's' : ''}: ${newPRs.slice(0,3).join(', ')}${newPRs.length > 3 ? ` +${newPRs.length-3} more` : ''}</div>`
    : '';

  // Rating stars
  const starRow = [1,2,3,4,5].map(n =>
    `<button class="star-btn${state.sessionRating >= n ? ' active' : ''}" onclick="setRating(${n})" id="star-${n}">★</button>`
  ).join('');

  div.innerHTML = `
    <div class="complete-icon">${isLastDay && (block?.weekNumber||1) > 1 ? '🏆' : '🏁'}</div>
    <div class="complete-title">${isLastDay ? 'Week ' + (block?.weekNumber||1) + ' Done.' : 'Session Done.'}</div>
    <div class="complete-sub">${session.dayName}</div>
    <div class="complete-stats">
      <div class="hero-stat"><div class="complete-stat-val">${formatDuration(session.duration)}</div><div class="complete-stat-label">Time</div></div>
      <div class="hero-stat"><div class="complete-stat-val">${totalSets}</div><div class="complete-stat-label">Sets Done</div></div>
    </div>
    ${prBanner}
    <div class="complete-rating-section">
      <div class="complete-rating-label">How'd it feel?</div>
      <div class="star-row">${starRow}</div>
      <textarea id="session-notes" placeholder="Any notes? (optional — injuries, energy, conditions…)"
        style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:12px;margin-top:12px;resize:none;height:80px;outline:none;font-family:inherit;"
      >${state.sessionNotes}</textarea>
    </div>
    <button class="btn-done" id="btn-save-done">SAVE &amp; DONE</button>
  `;

  div.querySelector('#btn-save-done').addEventListener('click', () => {
    state.sessionNotes = div.querySelector('#session-notes').value.trim();
    // Update session in Firebase with rating + notes
    if (state.pendingSessionKey && state.sessionRating) {
      const ref = dbRef(`sessions/${state.pendingSessionKey}`);
      if (ref) ref.update({ rating: state.sessionRating, notes: state.sessionNotes });
      // Also update local copy
      const local = state.workoutSessions.find(s => s.id === state.pendingSessionKey);
      if (local) { local.rating = state.sessionRating; local.notes = state.sessionNotes; }
    }
    goDone();
  });

  return div;
}

window.setRating = function(n) {
  state.sessionRating = n;
  [1,2,3,4,5].forEach(i => {
    const btn = document.getElementById(`star-${i}`);
    if (btn) btn.classList.toggle('active', i <= n);
  });
};

window.goDone = function() {
  state.view = 'home';
  render();
};

// ── HISTORY ────────────────────────────────────
function renderHistory() {
  const div = document.createElement('div');
  div.className = 'main-content scroll-view';
  div.innerHTML = `<div class="page-header" style="padding-bottom:16px;"><div class="page-title">History</div></div>`;

  const section = document.createElement('div');
  section.className = 'section';
  section.style.paddingTop = '0';

  // CSV Export button
  if (state.workoutSessions.length) {
    const exportBtn = document.createElement('button');
    exportBtn.className = 'btn-export';
    exportBtn.textContent = '↓ Export to CSV';
    exportBtn.addEventListener('click', () => exportCSV(state.workoutSessions));
    section.appendChild(exportBtn);
  }

  if (!state.workoutSessions.length) {
    section.innerHTML = `<div class="history-empty">No sessions yet.<br>Complete your first workout to see history here.</div>`;
  } else {
    state.workoutSessions.forEach(s => {
      const card = document.createElement('div');
      card.className = 'history-session';
      const exHtml = Object.entries(s.exercises || {}).map(([name, ex]) => {
        const doneSets = ex.sets.filter(s => s.done);
        if (!doneSets.length) return '';
        const tags = doneSets.map(set => `<span class="history-set-tag">${set.weight ? set.weight + 'lb' : ''} × ${set.reps || '—'}</span>`).join('');
        return `<div class="history-ex"><div class="history-ex-name">${name}</div><div class="history-sets">${tags}</div></div>`;
      }).join('');

      const ratingHtml = s.rating ? `<div style="color:var(--orange);font-size:13px;letter-spacing:1px;">${'★'.repeat(s.rating)}${'☆'.repeat(5-s.rating)}</div>` : '';
      const notesHtml = s.notes ? `<div style="font-size:12px;color:var(--text-muted);margin-top:6px;font-style:italic;">"${s.notes}"</div>` : '';
      card.innerHTML = `
        <div class="history-session-header">
          <div>
            <div class="history-session-name">${s.dayName}</div>
            <div class="history-session-date">${formatDate(s.startedAt)} · ${s.programName}</div>
            ${ratingHtml}
          </div>
          <div class="history-session-dur">${formatDuration(s.duration || 0)}</div>
        </div>
        ${notesHtml}
        ${exHtml}
      `;
      section.appendChild(card);
    });
  }

  div.appendChild(section);
  return div;
}

// ── PROFILE ────────────────────────────────────
function renderProfile() {
  const div = document.createElement('div');
  div.className = 'main-content scroll-view';

  const section = document.createElement('div');
  section.className = 'section';
  section.style.paddingTop = '16px';

  const sessions = state.workoutSessions;
  const total = sessions.length;
  const streak = getStreak(sessions);
  const totalTime = sessions.reduce((a,s) => a + (s.duration||0), 0);
  const thisWeek = thisWeekCount(sessions);
  const thisMonth = sessions.filter(s => {
    const d = new Date(s.startedAt);
    const now = new Date();
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  const avgMin = total ? Math.round(sessions.reduce((a,s) => a + (s.duration||0), 0) / total / 60000) : 0;

  const prof = state.userProfile;
  const initials = prof.name
    ? prof.name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2)
    : '?';

  // ── Hero card
  const heroEl = document.createElement('div');
  heroEl.innerHTML = `
    <div class="profile-hero">
      <div class="profile-avatar">${initials}</div>
      <div class="profile-hero-info">
        <div class="profile-hero-name">${prof.name || 'Add your name'}</div>
        <div class="profile-hero-meta">
          ${prof.location ? prof.location + '<br>' : ''}
          ${prof.bodyweight ? prof.bodyweight + ' lbs bodyweight' : ''}
        </div>
        ${prof.goal ? `<div class="profile-hero-goal">🎯 ${prof.goal}</div>` : ''}
      </div>
      <button class="btn-edit-profile" id="btn-edit-profile">Edit</button>
    </div>
  `;
  section.appendChild(heroEl);

  // ── Edit form (hidden by default)
  const editEl = document.createElement('div');
  editEl.id = 'profile-edit-form';
  editEl.className = 'profile-edit-form';
  editEl.style.display = 'none';
  editEl.innerHTML = `
    <div class="profile-field">
      <label>Name</label>
      <input id="pf-name" type="text" placeholder="Ryan B" value="${prof.name || ''}" />
    </div>
    <div class="profile-field">
      <label>Location</label>
      <input id="pf-location" type="text" placeholder="Ladera Ranch, CA" value="${prof.location || ''}" />
    </div>
    <div class="profile-field">
      <label>Bodyweight (lbs)</label>
      <input id="pf-bw" type="number" inputmode="decimal" placeholder="175" value="${prof.bodyweight || ''}" />
    </div>
    <div class="profile-field">
      <label>Training Goal</label>
      <input id="pf-goal" type="text" placeholder="Moto season prep" value="${prof.goal || ''}" />
    </div>
    <button class="btn-save-profile" id="btn-save-profile">SAVE PROFILE</button>
  `;
  section.appendChild(editEl);

  // ── Stats
  const statsEl = document.createElement('div');
  statsEl.innerHTML = `
    <div class="section-label" style="margin-top:4px;">Stats</div>
    <div class="stats-extended">
      <div class="stat-box"><div class="stat-box-val">${total}</div><div class="stat-box-label">Total</div></div>
      <div class="stat-box"><div class="stat-box-val">🔥${streak}</div><div class="stat-box-label">Streak</div></div>
      <div class="stat-box"><div class="stat-box-val">${formatTotalTime(totalTime)}</div><div class="stat-box-label">Time</div></div>
    </div>
    <div class="stats-extended-2">
      <div class="stat-box"><div class="stat-box-val">${thisWeek}</div><div class="stat-box-label">This Week</div></div>
      <div class="stat-box"><div class="stat-box-val">${thisMonth}</div><div class="stat-box-label">This Month</div></div>
      <div class="stat-box"><div class="stat-box-val">${avgMin}m</div><div class="stat-box-label">Avg Session</div></div>
    </div>
  `;
  section.appendChild(statsEl);

  // ── PR board
  const prs = Object.entries(state.allTimePRs).filter(([,v]) => v.weight)
    .sort((a,b) => +b[1].weight - +a[1].weight);
  const prEl = document.createElement('div');
  if (prs.length) {
    prEl.innerHTML = `<div class="section-label" style="margin-top:4px;">Personal Records — All Time 🏅</div>`;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cssText = 'padding:0;overflow:hidden;border-radius:14px;';
    prs.forEach(([name, val]) => {
      card.innerHTML += `
        <div class="pr-item" style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:14px;font-weight:700;">${name}</div>
            <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${val.date}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:18px;font-weight:900;color:var(--orange);">${val.weight}<span style="font-size:11px;font-weight:600;color:var(--text-muted);"> lbs</span></div>
            <div style="font-size:12px;color:var(--text-muted);">× ${val.reps} reps</div>
          </div>
        </div>

  } else {
    prEl.innerHTML = `<div style="text-align:center;padding:32px 20px;color:var(--text-muted);font-size:14px;">Complete a workout to start tracking PRs.</div>`;
  }
  section.appendChild(prEl);

  div.appendChild(section);

  // ── Wire events after render
  setTimeout(() => {
    const editBtn = document.getElementById('btn-edit-profile');
    const form = document.getElementById('profile-edit-form');
    const saveBtn = document.getElementById('btn-save-profile');
    if (editBtn) editBtn.addEventListener('click', () => {
      const isOpen = form.style.display !== 'none';
      form.style.display = isOpen ? 'none' : 'block';
      editBtn.textContent = isOpen ? 'Edit' : 'Cancel';
    });
    if (saveBtn) saveBtn.addEventListener('click', () => {
      const updated = {
        name: document.getElementById('pf-name').value.trim(),
        location: document.getElementById('pf-location').value.trim(),
        bodyweight: document.getElementById('pf-bw').value.trim(),
        goal: document.getElementById('pf-goal').value.trim(),
      };
      state.userProfile = updated;
      saveProfile(updated);
      form.style.display = 'none';
      editBtn.textContent = 'Edit';
      // Re-render hero area
      const avatar = document.querySelector('.profile-avatar');
      const nameEl = document.querySelector('.profile-hero-name');
      const metaEl = document.querySelector('.profile-hero-meta');
      const goalEl = document.querySelector('.profile-hero-goal');
      const init = updated.name ? updated.name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
      if (avatar) avatar.textContent = init;
      if (nameEl) nameEl.textContent = updated.name || 'Add your name';
      if (metaEl) metaEl.innerHTML = (updated.location ? updated.location + '<br>' : '') + (updated.bodyweight ? updated.bodyweight + ' lbs bodyweight' : '');
      if (goalEl) goalEl.textContent = updated.goal ? '🎯 ' + updated.goal : '';
    });
  }, 0);

  return div;
}

if (localStorage.getItem('dp-auth') === '1') {
  state.authed = true;
  loadSessions(sessions => {
    state.workoutSessions = sessions;
    state.prevWeights = buildPrevWeights(sessions);
    state.allTimePRs = buildAllTimePRs(sessions);
    loadMeta(meta => {
      state.blockMeta = meta.currentBlock || null;
      loadProfile(prof => {
        state.userProfile = { name:'', location:'', bodyweight:'', goal:'', ...prof };
        state.view = 'home';
        render();
      });
    });
  });
} else {
  render();
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
